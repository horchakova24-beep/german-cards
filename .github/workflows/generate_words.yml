name: Generate German Cards

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Какую тему обновить? (weather, restaurant, city, shopping, health, hotel, job, hobby, guests, emergency)'
        required: true
        default: 'restaurant'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Generator Script
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}  # Передаем ключ из вашего сейфа!
        run: |
          python generator.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Автоматическое обновление темы: ${{ github.event.inputs.topic }}" && git push)
