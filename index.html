        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .legend {
            width: 100%;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 15px;
            color: #fff;
            font-size: 13px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .card-box {
            width: 100%;
            perspective: 1000px;
        }
        .card {
            width: 100%;
            min-height: 320px;
            border-radius: 28px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            user-select: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
            position: relative;
        }
        .card:active {
            transform: scale(0.96);
        }
        .counter {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.4;
            letter-spacing: 1px;
        }
        .german {
            font-size: 28px;
            font-weight: 800;
            color: #000;
            margin-bottom: 20px;
            line-height: 1.35;
        }
        .russian {
            font-size: 19px;
            font-weight: 500;
            color: #444;
            line-height: 1.4;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
            width: 80%;
        }
        .controls {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
        }
        .btn {
            flex: 1;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }
        .btn:active {
            transform: scale(0.95);
            background: #444;
        }
        .mode-toggle {
            width: 100%;
            background: #ffae75;
            color: #111;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255,174,117,0.3);
        }
        .mode-toggle:active {
            transform: scale(0.98);
        }
        .topics-row {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .topic-tile {
            flex: 1;
            min-width: 130px;
            background: #ffae75;
            color: #111;
            border: none;
            padding: 14px 10px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255,174,117,0.3);
            display: flex;
            flex-direction: column;
            gap: 2px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .topic-tile:active {
            transform: scale(0.98);
        }
        .topic-tile.active {
            opacity: 0.75;
        }
        .topic-tile .topic-ru {
            font-size: 15px;
            font-weight: 800;
        }
        .topic-tile .topic-de {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.75;
        }
        .hidden-feed {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 15px;
        }
        .feed-card {
            width: 100%;
            min-height: 140px;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

            font-weight: 800;
            color: #000;
            margin-bottom: 8px;
        }
        .feed-russian {
            font-size: 15px;
            color: #444;

        const nextBtn = document.getElementById('nextBtn');
        const topicWeather = document.getElementById('topicWeather');
        
        const clickModeSection = document.getElementById('clickModeSection');

        function updateCard() {
            const item = phrases[currentIndex];
            cardGerman.innerText = item.de;
            cardRussian.innerText = item.ru;
            cardCounter.innerText = `${currentIndex + 1} / ${phrases.length}`;
            mainCard.style.backgroundColor = colors[item.cat];
        }

        mainCard.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % phrases.length;
            updateCard();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % phrases.length;
            updateCard();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + phrases.length) % phrases.length;
            updateCard();
        });

        topicWeather.addEventListener('click', () => {
            const isOpen = clickModeSection.style.display !== 'none';
            if (isOpen) {
                clickModeSection.style.display = 'none';
                topicWeather.classList.remove('active');
            } else {
                clickModeSection.style.display = 'block';
                topicWeather.classList.add('active');
                updateCard();
            }
        });

        updateCard();
    </script>
</body>
</html>
