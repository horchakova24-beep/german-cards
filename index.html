   <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fcf8f2; /* Мягкий кремовый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a3e3d; /* Темно-коричневый текст */
        }

        .phone-container {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            max-height: 840px;
            background-color: #fcf8f2;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Стильный заголовок */
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4a3e3d;
            text-shadow: 2px 2px 0px #fff;
            display: inline-block;
            position: relative;
        }

        /* Список уровней-полосочек */
        .levels-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        /* Сама игровая "полосочка" уровня */
        .level-card {
            background-color: #fff;
            border: 3px solid #4a3e3d; /* Толстая мультяшная обводка */
            border-radius: 20px; /* Круглые углы */
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 6px 0 #4a3e3d; /* Объемная тень */
            transition: all 0.1s ease;
        }

        /* Эффект нажатия */
        .level-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #4a3e3d;
        }

        .level-card-title {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .level-card-subtitle {
            font-size: 13px;
            color: #7d706e;
            font-weight: 500;
        }

        /* Контейнер для шкалы прогресса */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
            gap: 10px;
        }

        /* Серая дорожка прогресс-бара */
        .progress-bar-bg {
            flex-grow: 1;
            height: 12px;
            background-color: #e8e2da;
            border: 2px solid #4a3e3d;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* Яркая заливка прогресса */
        .progress-bar-fill {
            height: 100%;
            background-color: #2bd14e; /* Зеленый цвет */
            border-right: 2px solid #4a3e3d;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            font-weight: bold;
            color: #4a3e3d;
            white-space: nowrap;
        }

        /* Цвета для разных уровней */
        .color-blue { background-color: #bae1ff; }
        .color-green { background-color: #baffc9; }
        .color-orange { background-color: #ffdfba; }
        .color-purple { background-color: #e8d7ff; }
        .color-yellow { background-color: #ffffba; }

        /* ЭКРАН КАРТОЧКИ */
        .card-screen {
            display: none; /* Прячем до клика */
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        /* Кнопка "Назад" */
        .back-btn {
            align-self: flex-start;
            background-color: #fff;
            border: 3px solid #4a3e3d;
            border-radius: 15px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a3e3d;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.1s ease;
            margin-bottom: 20px;
        }

        .back-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #4a3e3d;
        }

        /* Сама карточка со словом */
        .card {
            background-color: #fff;
            border: 4px solid #4a3e3d;
            border-radius: 28px;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 0 #4a3e3d;
            cursor: pointer;
            user-select: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:active {
            transform: scale(0.96);
        }

        .counter {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        .german {
            font-size: 28px;
            font-weight: 800;
            color: #000;
            margin-bottom: 20px;
            line-height: 1.35;
        }

        .russian {
            font-size: 19px;
            font-weight: 500;
            color: #444;
            line-height: 1.4;
            border-top: 2px dashed #4a3e3d;
            padding-top: 15px;
            width: 80%;
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            font-size: 15px;
            font-weight: bold;
            border: 3px solid #4a3e3d;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 0 #4a3e3d;
            transition: all 0.1s ease;
            text-align: center;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #4a3e3d;
        }

        .btn-prev {
            background-color: #ffb3ba;
            color: #4a3e3d;
        }

        .btn-next {
            background-color: #baffc9;
            color: #4a3e3d;
        }
    </style>
</head>

];

 // БАЗА ДАННЫХ ДЛЯ ПОКУПОК (25 базовых карточек)
        const shoppingPhrases = [
            { de: "Guten Tag!", ru: "Добрый день!", cat: "other" },
            { de: "Ich möchte etwas kaufen.", ru: "Я хочу что-то купить.", cat: "other" },
            { de: "Wo finde ich das Brot?", ru: "Где я найду хлеб?", cat: "neu" },
            { de: "Wo ist die Milch?", ru: "Где молоко?", cat: "fem" },
            { de: "Haben Sie Äpfel?", ru: "У вас есть яблоки?", cat: "other" },
            { de: "Wie viel kostet das?", ru: "Сколько это стоит?", cat: "other" },
            { de: "Das ist zu teuer.", ru: "Это слишком дорого.", cat: "other" },
            { de: "Ich nehme ein Kilo.", ru: "Я возьму один килограмм.", cat: "neu" },
            { de: "Ich brauche einen Beutel.", ru: "Мне нужен пакет.", cat: "masc" },
            { de: "Kann ich mit Karte zahlen?", ru: "Можно платить картой?", cat: "fem" },
            { de: "Ich zahle bar.", ru: "Я плачу наличными.", cat: "other" },

            { de: "Ich suche den Käse.", ru: "Я ищу сыр.", cat: "masc" },

            { de: "Danke schön!", ru: "Большое спасибо!", cat: "other" },

            { de: "Ich habe eine Einkaufsliste.", ru: "У меня есть список покупок.", cat: "fem" },

            { de: "Ich kaufe schnell.", ru: "Я покупаю быстро.", cat: "other" },
            { de: "Auf Wiedersehen!", ru: "До свидания!", cat: "other" }
        ];

        // Переменная, которая указывает, какой список сейчас открыт (по умолчанию погода)
        let currentPhrases = phrases; 

        const colors = {
            fem: "#FFEBEE",
            neu: "#E8F5E9",
            masc: "#E3F2FD",
            other: "#FFFDE7"
        };

        let currentIndex = 0;

        const mainCard = document.getElementById('mainCard');
        const cardCounter = document.getElementById('cardCounter');
        const cardGerman = document.getElementById('cardGerman');
        const cardRussian = document.getElementById('cardRussian');
        
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const topicWeather = document.getElementById('topicWeather');
        const topicShopping = document.getElementById('topicShopping'); // Добавили новую кнопку в переменные
        
        const clickModeSection = document.getElementById('clickModeSection');

        function updateCard() {
            const item = currentPhrases[currentIndex];
            cardGerman.innerText = item.de;
            cardRussian.innerText = item.ru;
            cardCounter.innerText = `${currentIndex + 1} / ${currentPhrases.length}`;
            mainCard.style.backgroundColor = colors[item.cat];
        }

        mainCard.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % currentPhrases.length;
            updateCard();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % currentPhrases.length;
            updateCard();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + currentPhrases.length) % currentPhrases.length;
            updateCard();
        });

        // ЛОГИКА ДЛЯ КНОПКИ ПОГОДЫ
        topicWeather.addEventListener('click', () => {
            currentPhrases = phrases; // Включаем карточки погоды
            currentIndex = 0;
            
            const isOpen = clickModeSection.style.display !== 'none' && topicWeather.classList.contains('active');
            if (isOpen) {
                clickModeSection.style.display = 'none';
                topicWeather.classList.remove('active');
            } else {
                clickModeSection.style.display = 'block';
                topicWeather.classList.add('active');
                topicShopping.classList.remove('active'); // Выключаем кнопку покупок
                updateCard();
            }
        });

        // ЛОГИКА ДЛЯ КНОПКИ ПОКУПОК
        topicShopping.addEventListener('click', () => {
            currentPhrases = shoppingPhrases; // Включаем карточки покупок
            currentIndex = 0;
            
            const isOpen = clickModeSection.style.display !== 'none' && topicShopping.classList.contains('active');
            if (isOpen) {
                clickModeSection.style.display = 'none';
                topicShopping.classList.remove('active');
            } else {
                clickModeSection.style.display = 'block';
                topicShopping.classList.add('active');
                topicWeather.classList.remove('active'); // Выключаем кнопку погоды
                updateCard();
            }
        });

        updateCard();
    </script>
